<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐝 Mensaje importante...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #fff0f8 0%, #fce4f5 50%, #fdf2ff 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    overflow: hidden;
  }
  .titulo {
    font-size: 15px;
    color: #be185d;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeIn 1s 0.3s ease forwards;
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  .contenedor {
    position: relative;
    width: min(520px, 96vw);
    height: min(520px, 96vw);
  }
  svg { width: 100%; height: 100%; }

  /* RASTRO */
  .rastro {
    stroke-dasharray: 800;
    stroke-dashoffset: 800;
    animation: rastroAnim 4s ease-out forwards;
  }
  @keyframes rastroAnim {
    0%   { stroke-dashoffset: 800; opacity: 0.8; }
    85%  { stroke-dashoffset: 0; opacity: 0.5; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  /* ABEJA */
  .abeja {
    animation: volar 4s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes volar {
    0%   { transform: translate(470px, 40px) rotate(-20deg); opacity:0; }
    8%   { opacity:1; }
    30%  { transform: translate(330px, 155px) rotate(10deg); }
    55%  { transform: translate(245px, 100px) rotate(-15deg); }
    80%  { transform: translate(210px, 200px) rotate(5deg); }
    100% { transform: translate(178px, 228px) rotate(0deg); }
  }
  .ala-izq {
    animation: aleteo 0.11s linear infinite;
    transform-origin: 14px 7px;
  }
  .ala-der {
    animation: aleteo 0.11s linear infinite reverse;
    transform-origin: 20px 7px;
  }
  @keyframes aleteo {
    0%,100% { transform: scaleY(1) rotate(-8deg); }
    50%     { transform: scaleY(0.25) rotate(8deg); }
  }

  /* FLOR Y TALLO */
  .tallo { animation: crecer 0.8s 0.1s ease-out both; transform-origin: 230px 455px; }
  @keyframes crecer {
    from { transform: scaleY(0); opacity:0; }
    to   { transform: scaleY(1); opacity:1; }
  }
  .flor { animation: popFlor 0.6s 0.15s ease-out both; transform-origin: 230px 350px; }
  @keyframes popFlor {
    from { transform: scale(0) rotate(-30deg); opacity:0; }
    to   { transform: scale(1) rotate(0deg); opacity:1; }
  }
  .petalo { animation: popFlor 0.45s ease-out both; }
  .petalo:nth-child(1){animation-delay:.2s}
  .petalo:nth-child(2){animation-delay:.3s}
  .petalo:nth-child(3){animation-delay:.38s}
  .petalo:nth-child(4){animation-delay:.46s}
  .petalo:nth-child(5){animation-delay:.54s}
  .petalo:nth-child(6){animation-delay:.62s}
  .petalo:nth-child(7){animation-delay:.7s}
  .petalo:nth-child(8){animation-delay:.78s}

  /* DESTELLOS */
  .destello { animation: titilar 1.1s ease-in-out infinite alternate; }
  @keyframes titilar {
    from { opacity:0.25; transform: scale(0.7); }
    to   { opacity:1;    transform: scale(1.2); }
  }
  .d1{animation-delay:0s} .d2{animation-delay:.35s} .d3{animation-delay:.7s}

  /* BURBUJA */
  .burbuja { animation: pop 0.55s 3.85s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes pop {
    from { transform: scale(0) translate(0, 10px); opacity:0; }
    to   { transform: scale(1) translate(0, 0); opacity:1; }
  }

  /* CORAZON */
  .corazon {
    animation: pop 0.5s 4.1s cubic-bezier(.34,1.56,.64,1) both,
               latir 0.65s 4.6s ease-in-out infinite alternate;
  }
  @keyframes latir {
    from { transform: scale(1); }
    to   { transform: scale(1.28); }
  }

  /* GOTAS FLOTANTES FONDO */
  .gota { animation: flotar 3s ease-in-out infinite alternate; }
  .g1{animation-delay:0s} .g2{animation-delay:1.1s} .g3{animation-delay:2.2s} .g4{animation-delay:0.6s}
  @keyframes flotar {
    0%   { transform: translateY(0) rotate(0deg); opacity:.55; }
    100% { transform: translateY(-16px) rotate(18deg); opacity:.25; }
  }

  /* TEXTO INFERIOR */
  .firma {
    margin-top: 18px;
    font-size: 13px;
    color: #f472b6;
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeIn 1s 4.5s ease forwards;
  }
</style>
</head>
<body>

<p class="titulo">🌸 tienes un mensaje 🌸</p>

<div class="contenedor">
<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="cFlor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Puntos decorativos -->
  <circle cx="55"  cy="55"  r="4" fill="#f9a8d4" opacity=".35"/>
  <circle cx="430" cy="70"  r="3" fill="#fbcfe8" opacity=".3"/>
  <circle cx="450" cy="300" r="4" fill="#f9a8d4" opacity=".3"/>
  <circle cx="30"  cy="380" r="3" fill="#f472b6" opacity=".25"/>
  <circle cx="400" cy="420" r="3" fill="#fbbf24" opacity=".3"/>

  <!-- Pétalos flotantes decorativos -->
  <ellipse class="gota g1" cx="65"  cy="160" rx="9" ry="5" fill="#f9a8d4" opacity=".6" transform="rotate(35,65,160)"/>
  <ellipse class="gota g2" cx="420" cy="280" rx="7" ry="4" fill="#f472b6" opacity=".5" transform="rotate(-25,420,280)"/>
  <ellipse class="gota g3" cx="340" cy="70"  rx="8" ry="4" fill="#fbcfe8" opacity=".55" transform="rotate(50,340,70)"/>
  <ellipse class="gota g4" cx="130" cy="390" rx="6" ry="3.5" fill="#f9a8d4" opacity=".45" transform="rotate(15,130,390)"/>

  <!-- Rastro de vuelo -->
  <path class="rastro"
    d="M470,40 Q390,110 330,155 Q275,195 245,100 Q225,55 210,200 Q200,265 182,232"
    fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity=".75"/>

  <!-- TALLO -->
  <g class="tallo">
    <line x1="230" y1="360" x2="230" y2="460" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="211" cy="418" rx="20" ry="11" fill="#4ade80" opacity=".85" transform="rotate(-30,211,418)"/>
    <ellipse cx="251" cy="435" rx="18" ry="10" fill="#22c55e" opacity=".75" transform="rotate(25,251,435)"/>
  </g>

  <!-- FLOR -->
  <g class="flor">
    <!-- 8 pétalos -->
    <g class="petalo"><ellipse cx="230" cy="302" rx="26" ry="44" fill="#f472b6" opacity=".93" filter="url(#sglow)"/></g>
    <g class="petalo"><ellipse cx="230" cy="418" rx="26" ry="44" fill="#f9a8d4" opacity=".88" filter="url(#sglow)"/></g>
    <g class="petalo"><ellipse cx="186" cy="330" rx="26" ry="44" fill="#ec4899" opacity=".91" transform="rotate(45,186,330)" filter="url(#sglow)"/></g>
    <g class="petalo"><ellipse cx="274" cy="330" rx="26" ry="44" fill="#fbcfe8" opacity=".87" transform="rotate(-45,274,330)" filter="url(#sglow)"/></g>
    <g class="petalo"><ellipse cx="186" cy="390" rx="26" ry="44" fill="#f472b6" opacity=".89" transform="rotate(-45,186,390)" filter="url(#sglow)"/></g>
    <g class="petalo"><ellipse cx="274" cy="390" rx="26" ry="44" fill="#ec4899" opacity=".86" transform="rotate(45,274,390)" filter="url(#sglow)"/></g>
    <g class="petalo"><ellipse cx="170" cy="360" rx="26" ry="40" fill="#f9a8d4" opacity=".83" transform="rotate(90,170,360)" filter="url(#sglow)"/></g>
    <g class="petalo"><ellipse cx="290" cy="360" rx="26" ry="40" fill="#f472b6" opacity=".86" transform="rotate(90,290,360)" filter="url(#sglow)"/></g>
    <!-- Centro -->
    <circle cx="230" cy="360" r="36" fill="url(#cFlor)" filter="url(#glow)"/>
    <circle cx="230" cy="360" r="26" fill="#FFE566"/>
    <circle cx="230" cy="360" r="14" fill="#F5B800"/>
    <circle cx="225" cy="353" r="3"   fill="#d97706" opacity=".7"/>
    <circle cx="237" cy="355" r="2.5" fill="#d97706" opacity=".6"/>
    <circle cx="229" cy="367" r="2.5" fill="#d97706" opacity=".65"/>
    <circle cx="239" cy="365" r="2"   fill="#d97706" opacity=".5"/>
    <circle cx="221" cy="365" r="2"   fill="#d97706" opacity=".5"/>
  </g>

  <!-- Destellos -->
  <g class="destello d1" style="transform-origin:230px 310px">
    <line x1="230" y1="296" x2="230" y2="280" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="242" y1="299" x2="251" y2="286" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="218" y1="299" x2="209" y2="286" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="destello d2" style="transform-origin:285px 332px">
    <line x1="285" y1="332" x2="300" y2="322" stroke="#f9a8d4" stroke-width="2" stroke-linecap="round"/>
    <line x1="288" y1="342" x2="304" y2="342" stroke="#f9a8d4" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="destello d3" style="transform-origin:175px 342px">
    <line x1="175" y1="342" x2="160" y2="332" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
    <line x1="172" y1="352" x2="155" y2="352" stroke="#f472b6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- BURBUJA con mensaje -->
  <g class="burbuja" style="transform-origin: 310px 195px;">
    <rect x="255" y="158" width="178" height="66" rx="18" fill="white" opacity=".97" stroke="#f472b6" stroke-width="2.2"/>
    <!-- colita de la burbuja -->
    <polygon points="270,224 255,248 292,224" fill="white" stroke="#f472b6" stroke-width="1.8" stroke-linejoin="round"/>
    <text x="344" y="193" text-anchor="middle" font-family="Georgia,serif" font-size="23" fill="#be185d" font-weight="bold">¡Bañate! 🛁</text>
    <text x="344" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f472b6">con cariño 🐝💕</text>
  </g>

  <!-- CORAZÓN -->
  <g class="corazon" style="transform-origin: 200px 205px;">
    <path d="M200,202 C200,197 196,193 191,193 C186,193 182,197 182,202 C182,197 178,193 173,193 C168,193 164,197 164,202 C164,210 182,220 182,220 C182,220 200,210 200,202Z"
          fill="#f472b6" opacity=".9" filter="url(#glow)"/>
  </g>

  <!-- ABEJA -->
  <g class="abeja">
    <!-- Sombra suave -->
    <ellipse cx="18" cy="26" rx="13" ry="4" fill="#be185d" opacity=".12"/>
    <!-- Alas -->
    <ellipse class="ala-izq" cx="12" cy="7" rx="14" ry="7" fill="#bae6fd" opacity=".78"/>
    <ellipse class="ala-der" cx="22" cy="7" rx="14" ry="7" fill="#bae6fd" opacity=".78"/>
    <!-- Cuerpo -->
    <ellipse cx="17" cy="18" rx="11" ry="14" fill="#fbbf24"/>
    <!-- Rayas negras -->
    <rect x="7"  y="13" width="20" height="5" rx="3" fill="#1c1917" opacity=".72"/>
    <rect x="7"  y="20" width="20" height="5" rx="3" fill="#1c1917" opacity=".72"/>
    <!-- Cabeza -->
    <circle cx="17" cy="5" r="7" fill="#fbbf24"/>
    <!-- Ojos -->
    <circle cx="13.5" cy="4" r="2.2" fill="#1c1917"/>
    <circle cx="20.5" cy="4" r="2.2" fill="#1c1917"/>
    <circle cx="14"   cy="3.4" r="0.9" fill="white"/>
    <circle cx="21"   cy="3.4" r="0.9" fill="white"/>
    <!-- Sonrisa -->
    <path d="M14,8 Q17,11 20,8" fill="none" stroke="#1c1917" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Antenas -->
    <line x1="13" y1="0" x2="8"  y2="-7" stroke="#1c1917" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21" y1="0" x2="26" y2="-7" stroke="#1c1917" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="8"  cy="-7" r="2.2" fill="#f472b6"/>
    <circle cx="26" cy="-7" r="2.2" fill="#f472b6"/>
    <!-- Aguijón -->
    <polygon points="17,32 14,29 20,29" fill="#d97706"/>
  </g>

</svg>
</div>

<p class="firma">🌸 🐝 🌸</p>

</body>
</html>
