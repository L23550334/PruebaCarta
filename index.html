<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una invitación para ti 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush: #ffe6ee;
    --blush-deep: #ffd1e0;
    --rose: #ff5d8f;
    --rose-deep: #c9184a;
    --plum: #4a1942;
    --gold: #ffd166;
    --white-soft: #fff7fa;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    min-height:100dvh;
    width:100%;
    overflow-x:hidden;
    background: radial-gradient(ellipse at top, var(--blush-deep) 0%, var(--blush) 55%, #ffc4d6 100%);
    font-family: 'Quicksand', sans-serif;
    color: var(--plum);
  }

  #hearts-bg{
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .floating-heart{
    position: absolute;
    bottom: -60px;
    opacity: 0.55;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 2px 4px rgba(201,24,74,0.15));
  }

  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10%{ opacity: 0.6; }
    50%{ transform: translateY(-50vh) translateX(20px) rotate(10deg); }
    90%{ opacity: 0.5; }
    100%{ transform: translateY(-105vh) translateX(-15px) rotate(-8deg); opacity: 0; }
  }

  .stage{
    position: relative;
    z-index: 2;
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  #stage-inner{
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .envelope-wrap{
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    perspective: 1400px;
  }

  /* ---------- Envelope ---------- */

  .envelope{
    width: 100%;
    max-width: 360px;
    height: 240px;
    position: relative;
    cursor: pointer;
    transition: transform 0.4s ease;
  }

  .envelope:hover{ transform: translateY(-4px); }

  .env-body{
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, var(--rose) 0%, var(--rose-deep) 100%);
    border-radius: 14px;
    box-shadow: 0 20px 45px rgba(201,24,74,0.35);
  }

  .env-flap{
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 130px;
    background: linear-gradient(160deg, #ff7aa8, var(--rose));
    clip-path: polygon(0 0, 50% 78%, 100% 0);
    border-radius: 14px 14px 0 0;
    transform-origin: top;
    transition: transform 0.7s cubic-bezier(.68,-0.4,.27,1.4);
    z-index: 3;
  }

  .envelope.open .env-flap{
    transform: rotateX(180deg);
  }

  .seal{
    position: absolute;
    top: 96px; left: 50%;
    transform: translate(-50%, -50%);
    width: 54px; height: 54px;
    background: radial-gradient(circle at 35% 30%, #ffdfe9, var(--gold) 45%, #e8a13b 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.25);
    z-index: 4;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .envelope.open .seal{
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.4);
  }

  .env-hint{
    text-align:center;
    margin-top: 22px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--rose-deep);
    font-size: 1.05rem;
    letter-spacing: 0.3px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity: 0.65; }
    50%{ opacity: 1; }
  }

  .envelope.open ~ .env-hint{ display:none; }

  /* ---------- CARTA DE MI PARA TIIIIIIIII---------- */
  .card{
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: var(--white-soft);
    border-radius: 24px;
    padding: 40px 28px 32px;
    box-shadow: 0 30px 70px rgba(201,24,74,0.28), 0 0 0 1px rgba(255,255,255,0.6) inset;
    text-align: center;
    position: relative;
    opacity: 0;
    transform: translateY(40px) scale(0.94);
    transition: opacity 0.7s ease, transform 0.7s cubic-bezier(.2,.8,.2,1);
    pointer-events: none;
  }

  .card.visible{
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .card::before{
    content:"";
    position:absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    width: 34px; height: 34px;
    background: var(--white-soft);
    clip-path: polygon(50% 0, 0 100%, 100% 100%);
    filter: drop-shadow(0 -4px 6px rgba(201,24,74,0.12));
  }

  .eyebrow{
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 0.7rem;
    color: var(--rose);
    font-weight: 700;
    margin-bottom: 10px;
  }

  h1{
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.9rem;
    line-height: 1.25;
    margin: 0 0 6px;
    color: var(--rose-deep);
  }

  h1 em{
    font-style: italic;
    color: var(--rose);
  }

  .day-badge{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(120deg, var(--rose), var(--rose-deep));
    color: white;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-style: italic;
    font-size: 1.1rem;
    padding: 8px 22px;
    border-radius: 999px;
    margin: 14px 0 18px;
    box-shadow: 0 8px 20px rgba(201,24,74,0.3);
  }

  p.msg{
    font-size: 0.98rem;
    line-height: 1.6;
    color: #6b4257;
    margin: 0 0 28px;
  }

  .buttons{
    position: relative;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    align-items: center;
    min-height: 130px;
    width: 100%;
    overflow: hidden;
  }

  button{
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
  }

  #yes-btn{
    background: linear-gradient(120deg, var(--rose), var(--rose-deep));
    color: white;
    box-shadow: 0 10px 24px rgba(201,24,74,0.4);
  }

  #yes-btn:hover{
    transform: scale(1.06);
    box-shadow: 0 14px 30px rgba(201,24,74,0.5);
  }

  #no-btn{
    background: #ffeaf1;
    color: var(--rose-deep);
    position: relative;
    transition: transform 0.18s ease, left 0.18s ease, top 0.18s ease;
  }

  .buttons.dodging #no-btn{
    position: absolute;
  }

  .result{
    margin-top: 22px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--rose-deep);
    min-height: 1.4em;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .result.show{
    opacity: 1;
    transform: translateY(0);
  }

  .result.yes-result{ color: var(--rose-deep); }

  .confetti-heart{
    position: fixed;
    top: -10%;
    font-size: 1.4rem;
    z-index: 10;
    pointer-events: none;
    animation: fall 2.6s ease-in forwards;
  }

  @keyframes fall{
    to{
      transform: translateY(110vh) rotate(360deg);
      opacity: 0;
    }
  }

  @media (max-width: 420px){
    h1{ font-size: 1.5rem; }
    .card{ padding: 30px 20px 24px; }
    .day-badge{ font-size: 1rem; padding: 7px 18px; }
    p.msg{ font-size: 0.92rem; }
    button{ font-size: 0.92rem; padding: 12px 20px; }
    .envelope{ height: 210px; }
  }

  @media (max-width: 340px){
    h1{ font-size: 1.32rem; }
    .card{ padding: 26px 16px 22px; }
    button{ padding: 11px 16px; font-size: 0.86rem; }
  }

  @media (prefers-reduced-motion: reduce){
    .floating-heart, .env-hint, #yes-btn:hover, .confetti-heart{ animation: none !important; }
    *{ transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div id="hearts-bg"></div>

<div class="stage">

  <div id="stage-inner">
    <div class="envelope-wrap" id="envelope-wrap">
      <div class="envelope" id="envelope">
        <div class="env-body"></div>
        <div class="env-flap"></div>
        <div class="seal">💌</div>
      </div>
      <div class="env-hint">Toca el sobre para abrirlo ✨</div>
    </div>

    <div class="card" id="card">
      <div class="eyebrow">Para ti</div>
      <h1>¿Te gustaría <em>salir conmigo</em>?</h1>
      <div class="day-badge">🌸 Este viernes 🌸</div>
      <p class="msg">
       No te veo desde casi 1 semana y siento que fue hace 1 década
       No te enojes conmigo y permiteme demostrarte mis sentimientos
       por ti un día a la vez 💕
      </p>

      <div class="buttons" id="buttons">
        <button id="yes-btn">Sí, me encantaría 💗</button>
        <button id="no-btn">No puedo</button>
      </div>

      <div class="result" id="result"></div>
    </div>
  </div>

</div>
  //Si leees esto luisa estas bien hermosa, no dejes de sonreir 
<script>
  //corazoncitos de amor flotando
  const heartsBg = document.getElementById('hearts-bg');
  const heartEmojis = ['💗','💕','💖','🌸','💓'];
  const numHearts = 22;
  for(let i=0;i<numHearts;i++){
    const h = document.createElement('div');
    h.className = 'floating-heart';
    h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    const size = 14 + Math.random()*22;
    h.style.fontSize = size + 'px';
    h.style.left = Math.random()*100 + 'vw';
    h.style.animationDuration = (8 + Math.random()*10) + 's';
    h.style.animationDelay = (Math.random()*10) + 's';
    heartsBg.appendChild(h);
  }

  // ENVELOPEN ABIERTO
  const envelope = document.getElementById('envelope');
  const card = document.getElementById('card');
  envelope.addEventListener('click', () => {
    if(envelope.classList.contains('open')) return;
    envelope.classList.add('open');
    setTimeout(() => {
      card.classList.add('visible');
    }, 380);
  });

  //BOTON QUE SE NIEGA
  const buttons = document.getElementById('buttons');
  const noBtn = document.getElementById('no-btn');
  const yesBtn = document.getElementById('yes-btn');
  const result = document.getElementById('result');
  let dodgeCount = 0;
  const maxDodges = 6;

  function dodge(){
    if(dodgeCount >= maxDodges) return;
    dodgeCount++;
    buttons.classList.add('dodging');
    const rect = buttons.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    const maxX = Math.max(rect.width - btnRect.width, 40);
    const maxY = Math.max(rect.height - btnRect.height, 10) + 40;
    const newX = Math.random() * maxX;
    const newY = (Math.random() * maxY) - 20;
    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';

    const phrases = ['¿Segura? 🥺','Mejor lo pienso...','Casi casi 😅','¡Casi te atrapo!','Inténtalo de nuevo 💭'];
    if(dodgeCount <= phrases.length){
      showResult(phrases[dodgeCount-1], false);
    }
  }

  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    dodge();
  }, {passive:false});

  noBtn.addEventListener('click', () => {
    showResult('Eso es un sí, bonita 💗', true);
    burstHearts();
  });

  yesBtn.addEventListener('click', () => {
    showResult('¡Nos vemos el viernes! No puedo esperar 💕', true);
    burstHearts();
  });

  function showResult(text, celebrate){
    result.textContent = text;
    result.classList.remove('show');
    void result.offsetWidth;
    result.classList.add('show');
  }

  function burstHearts(){
    const emojis = ['💗','💕','💖','🌸','✨'];
    for(let i=0;i<26;i++){
      const c = document.createElement('div');
      c.className = 'confetti-heart';
      c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      c.style.left = Math.random()*100 + 'vw';
      c.style.animationDelay = (Math.random()*0.6) + 's';
      c.style.fontSize = (14 + Math.random()*16) + 'px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3200);
    }
  }
</script>

</body>
</html>
